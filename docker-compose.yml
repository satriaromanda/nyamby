version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: nyamby-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nyamby
    ports:
      - "5432:5432"
    volumes:
      - nyamby_pgdata:/var/lib/postgresql/data

volumes:
  nyamby_pgdata:
